[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scoresheet"
version = "0.1.0"
description = "Arrange MIDI score sheets for supported ensembles."
requires-python = ">=3.10"

[project.scripts]
scoresheet = "scoresheet.cli:main"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
